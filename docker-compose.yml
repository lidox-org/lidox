version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lidox-postgres
    environment:
      POSTGRES_USER: lidox
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lidox
    ports:
      - "5432:5432"
    volumes:
      - lidox-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lidox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lidox-redis
    ports:
      - "6379:6379"
    volumes:
      - lidox-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

# Named volumes ensure your database data isn't lost 
# every time you stop the containers.
volumes:
  lidox-pg-data:
  lidox-redis-data: